<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لوحة التحكم — مطعم وكافيه الخواجة</title>
<meta name="theme-color" content="#0d0d0d">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0c;
    --paper:#161513;
    --paper-2:#1d1b18;
    --ink:#f3ede2;
    --ink-soft:#b9ad98;
    --gold:#cda34a;
    --gold-bright:#e8c674;
    --gold-dim:#8a6f34;
    --line:#2c2822;
    --radius:16px;
    --shadow: 0 10px 30px rgba(0,0,0,0.45);
    --danger:#e8543a;
    --success:#5cb87a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
  body{
    font-family:'Cairo',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
  }

  /* ===== شاشة تسجيل الدخول ===== */
  #loginScreen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .login-mark{
    width:64px;height:64px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    margin-bottom:18px;
    background:rgba(205,163,74,0.08);
  }
  .login-title{
    font-family:'Amiri', serif;
    font-size:24px;
    color:var(--gold-bright);
    margin:0 0 6px;
  }
  .login-sub{ color:var(--ink-soft); font-size:13px; margin:0 0 28px; }
  #passwordInput{
    width:100%;
    max-width:280px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 18px;
    font-size:20px;
    letter-spacing:6px;
    text-align:center;
    color:var(--ink);
    outline:none;
    font-family:inherit;
  }
  #passwordInput:focus{ border-color:var(--gold); }
  .login-btn{
    margin-top:16px;
    width:100%;
    max-width:280px;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold-dim));
    color:#181410;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    font-family:inherit;
  }
  .login-btn:active{ transform:scale(0.98); }
  .login-error{
    color:var(--danger);
    font-size:13px;
    margin-top:14px;
    min-height:18px;
  }
  .back-link{
    position:absolute;
    top:18px;
    inset-inline-start:18px;
    color:var(--ink-soft);
    text-decoration:none;
    font-size:13px;
  }

  /* ===== لوحة التحكم ===== */
  #dashboard{ display:none; }
  .admin-header{
    position:sticky;
    top:0;
    z-index:30;
    background:rgba(11,11,12,0.95);
    backdrop-filter:blur(10px);
    padding:16px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .admin-header h1{
    font-family:'Amiri', serif;
    font-size:19px;
    color:var(--gold-bright);
    margin:0;
  }
  .logout-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--ink-soft);
    padding:7px 14px;
    border-radius:999px;
    font-size:12px;
    cursor:pointer;
    font-family:inherit;
  }

  .status-bar{
    padding:10px 18px;
    font-size:12.5px;
    text-align:center;
    display:none;
  }
  .status-bar.show{ display:block; }
  .status-bar.saving{ background:rgba(205,163,74,0.12); color:var(--gold-bright); }
  .status-bar.success{ background:rgba(92,184,122,0.12); color:var(--success); }
  .status-bar.error{ background:rgba(232,84,58,0.12); color:var(--danger); }

  .section{ padding:18px; }
  .section-title{
    font-size:15px;
    font-weight:800;
    color:var(--gold-bright);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .add-item-btn{
    width:100%;
    background:linear-gradient(135deg, var(--gold-bright), var(--gold-dim));
    color:#181410;
    border:none;
    border-radius:14px;
    padding:13px;
    font-size:14px;
    font-weight:800;
    cursor:pointer;
    margin-bottom:16px;
    font-family:inherit;
  }

  .cat-block{ margin-bottom:8px; }
  .cat-header{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 4px;
    font-size:13.5px;
    font-weight:700;
    color:var(--ink-soft);
  }
  .cat-count{
    background:var(--gold);
    color:var(--bg);
    font-size:10.5px;
    font-weight:700;
    padding:1px 8px;
    border-radius:999px;
    margin-inline-start:auto;
  }

  .item-card{
    background:linear-gradient(160deg, var(--paper), var(--paper-2));
    border-radius:var(--radius);
    padding:14px;
    margin:10px 0;
    border:1px solid var(--line);
    box-shadow:var(--shadow);
  }
  .item-card.hidden-item{ opacity:0.5; }
  .item-row-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .item-name-field{
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    margin:0 0 2px;
  }
  .item-name-en{ font-size:11.5px; color:var(--ink-soft); }
  .item-actions{ display:flex; gap:6px; flex:0 0 auto; }
  .icon-btn{
    background:rgba(255,255,255,0.06);
    border:1px solid var(--line);
    color:var(--ink-soft);
    width:32px;height:32px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .icon-btn.danger{ color:var(--danger); border-color:rgba(232,84,58,0.3); }
  .icon-btn.active{ color:var(--gold-bright); border-color:var(--gold); background:rgba(205,163,74,0.15); }

  .price-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }
  .price-row label{ font-size:12px; color:var(--ink-soft); flex:0 0 auto; }
  .price-input{
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    color:var(--ink);
    font-size:14px;
    width:90px;
    font-family:inherit;
  }
  .save-price-btn{
    background:var(--gold-dim);
    color:var(--ink);
    border:none;
    border-radius:10px;
    padding:8px 12px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
  }

  .offer-toggle-row{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .offer-fields{
    display:none;
    gap:8px;
    margin-top:10px;
    flex-wrap:wrap;
  }
  .offer-fields.show{ display:flex; }
  .offer-field{ flex:1; min-width:120px; }
  .offer-field label{ font-size:11px; color:var(--ink-soft); display:block; margin-bottom:4px; }
  .offer-field input{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 10px;
    color:var(--ink);
    font-size:13px;
    font-family:inherit;
  }

  .toggle-switch{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .toggle-switch input{ accent-color: var(--gold); width:18px; height:18px; }

  /* ===== نموذج إضافة صنف (Modal) ===== */
  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:100;
    align-items:flex-end;
  }
  .modal-overlay.show{ display:flex; }
  .modal-sheet{
    background:var(--paper);
    width:100%;
    max-width:560px;
    margin:0 auto;
    border-radius:20px 20px 0 0;
    padding:22px 18px 30px;
    max-height:88vh;
    overflow-y:auto;
    border-top:1px solid var(--gold-dim);
  }
  .modal-title{ font-size:16px; font-weight:800; color:var(--gold-bright); margin:0 0 16px; }
  .form-field{ margin-bottom:12px; }
  .form-field label{ font-size:12.5px; color:var(--ink-soft); display:block; margin-bottom:5px; }
  .form-field input, .form-field textarea, .form-field select{
    width:100%;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:12px;
    padding:11px 13px;
    color:var(--ink);
    font-size:14px;
    font-family:inherit;
  }
  .form-field textarea{ resize:vertical; min-height:50px; }
  .form-row{ display:flex; gap:10px; }
  .form-row .form-field{ flex:1; }
  .modal-actions{ display:flex; gap:10px; margin-top:18px; }
  .btn-primary, .btn-secondary{
    flex:1;
    padding:13px;
    border-radius:14px;
    font-size:14px;
    font-weight:800;
    cursor:pointer;
    border:none;
    font-family:inherit;
  }
  .btn-primary{ background:linear-gradient(135deg, var(--gold-bright), var(--gold-dim)); color:#181410; }
  .btn-secondary{ background:rgba(255,255,255,0.06); color:var(--ink-soft); border:1px solid var(--line); }

  .empty-hint{ text-align:center; color:var(--ink-soft); font-size:13px; padding:30px 0; }
  .toast-note{ font-size:11px; color:var(--ink-soft); margin-top:6px; }

  .settings-section{
    margin-top:8px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }
  .settings-toggle-btn{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--line);
    color:var(--ink-soft);
    border-radius:14px;
    padding:12px;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .settings-panel{
    display:none;
    margin-top:14px;
    background:linear-gradient(160deg, var(--paper), var(--paper-2));
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
  }
  .settings-panel.show{ display:block; }
  .settings-panel .form-field{ margin-bottom:12px; }
  .change-pwd-actions{ display:flex; gap:10px; margin-top:6px; }
  .pwd-status{ font-size:12.5px; margin-top:10px; min-height:16px; }
  .pwd-status.success{ color:var(--success); }
  .pwd-status.error{ color:var(--danger); }
</style>
</head>
<body>

<!-- ===== شاشة تسجيل الدخول ===== -->
<div id="loginScreen">
  <a class="back-link" href="index.html">‹ رجوع للمنيو</a>
  <div class="login-mark">🔐</div>
  <p class="login-title">لوحة تحكم القائمة</p>
  <p class="login-sub">أدخل كلمة السر للمتابعة</p>
  <input type="password" id="passwordInput" placeholder="••••" inputmode="numeric" maxlength="10">
  <button class="login-btn" id="loginBtn" onclick="attemptLogin()">دخول</button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- ===== لوحة التحكم ===== -->
<div id="dashboard">
  <div class="admin-header">
    <h1>🔐 لوحة التحكم</h1>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="section">
    <button class="add-item-btn" onclick="openAddModal()">➕ إضافة صنف جديد</button>
    <div id="categoriesContainer"></div>

    <div class="settings-section">
      <button class="settings-toggle-btn" onclick="toggleSettingsPanel()">⚙️ <span id="settingsToggleText">تغيير كلمة السر</span></button>
      <div class="settings-panel" id="settingsPanel">
        <div class="form-field">
          <label>كلمة السر الحالية</label>
          <input type="password" id="currentPwdInput" placeholder="••••" inputmode="numeric">
        </div>
        <div class="form-field">
          <label>كلمة السر الجديدة</label>
          <input type="password" id="newPwdInput" placeholder="••••" inputmode="numeric">
        </div>
        <div class="form-field">
          <label>تأكيد كلمة السر الجديدة</label>
          <input type="password" id="confirmPwdInput" placeholder="••••" inputmode="numeric">
        </div>
        <div class="change-pwd-actions">
          <button class="btn-secondary" onclick="toggleSettingsPanel()">إلغاء</button>
          <button class="btn-primary" onclick="submitChangePassword()">حفظ كلمة السر</button>
        </div>
        <div class="pwd-status" id="pwdStatus"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== نموذج إضافة/تعديل صنف ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <p class="modal-title" id="modalTitle">إضافة صنف جديد</p>

    <div class="form-field">
      <label>القسم</label>
      <select id="formCategory"></select>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label>الاسم (عربي)</label>
        <input type="text" id="formNameAr" placeholder="مثال: حمص بالطحينة">
      </div>
      <div class="form-field">
        <label>الاسم (إنجليزي)</label>
        <input type="text" id="formNameEn" placeholder="e.g. Hummus">
      </div>
    </div>

    <div class="form-field">
      <label>الوصف (عربي)</label>
      <textarea id="formDescAr" placeholder="وصف الصنف بالعربي"></textarea>
    </div>
    <div class="form-field">
      <label>الوصف (إنجليزي)</label>
      <textarea id="formDescEn" placeholder="Item description in English"></textarea>
    </div>

    <div class="form-field">
      <label>السعر (ل.س)</label>
      <input type="number" id="formPrice" step="500" min="0" placeholder="مثال: 78000">
    </div>

    <p class="toast-note">💡 الصنف الجديد يستخدم صورة افتراضية لحين إضافة صورة خاصة له لاحقاً.<br>💱 الأسعار تُدخل بالليرة السورية دائماً، والدولار يُحسب تلقائياً للعرض على الزبون.</p>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary" onclick="submitAddItem()">حفظ</button>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://0klkzme0qu-8077.hosted.obvious.ai";
const CATEGORY_LABELS = {
  appetizers: "🥗 مقبلات",
  grills: "🍢 مشاوي",
  hot_drinks: "☕ مشروبات ساخنة",
  juices: "🥤 عصائر"
};

let MENU_DATA = null;
let CURRENT_SHA = null;
let AUTH_PASSWORD = null; // نحتفظ فيها بالذاكرة فقط بعد نجاح الدخول (مش تُخزّن)
let EXCHANGE_RATE = 13000; // سعر الصرف ل.س مقابل 1 دولار (يُحدَّث من menu-data.json عند التحميل)

// الأسعار مخزّنة بالدولار داخلياً (لتوافق باقي النظام)، لكن صاحب المطعم يدخلها بالليرة السورية مباشرة
function usdToSyp(usd){
  return Math.round((usd * EXCHANGE_RATE) / 100) * 100; // تقريب لأقرب 100 ل.س
}
function sypToUsd(syp){
  return Math.round((syp / EXCHANGE_RATE) * 100) / 100; // تقريب لأقرب سنت دولار (للتخزين الداخلي فقط)
}

// ---------- تسجيل الدخول ----------
async function attemptLogin(){
  const pwd = document.getElementById('passwordInput').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.innerText = '';

  if(!pwd){ errEl.innerText = 'أدخلي كلمة السر'; return; }

  try{
    const res = await fetch(`${API_BASE}/api/verify-password`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pwd})
    });
    const json = await res.json();
    if(json.ok){
      AUTH_PASSWORD = pwd;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      await loadMenu();
    } else {
      errEl.innerText = json.error || 'كلمة السر غير صحيحة';
    }
  }catch(e){
    errEl.innerText = 'تعذر الاتصال بالخدمة. حاولي مرة أخرى.';
  }
}

document.getElementById('passwordInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') attemptLogin();
});

function logout(){
  AUTH_PASSWORD = null;
  MENU_DATA = null;
  document.getElementById('passwordInput').value = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

// ---------- تحميل القائمة ----------
async function loadMenu(){
  showStatus('جاري تحميل القائمة...', 'saving');
  try{
    const res = await fetch(`${API_BASE}/api/menu`);
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    MENU_DATA = json.data;
    CURRENT_SHA = json.sha;
    if(MENU_DATA.settings && MENU_DATA.settings.exchange_rate_syp_per_usd){
      EXCHANGE_RATE = MENU_DATA.settings.exchange_rate_syp_per_usd;
    }
    renderCategories();
    hideStatus();
  }catch(e){
    showStatus('فشل تحميل القائمة: ' + e.message, 'error');
  }
}

// ---------- حفظ القائمة على GitHub ----------
async function persistMenu(successMessage){
  showStatus('جاري الحفظ...', 'saving');
  try{
    const res = await fetch(`${API_BASE}/api/save`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: AUTH_PASSWORD, data: MENU_DATA, sha: CURRENT_SHA})
    });
    const json = await res.json();
    if(!json.ok) throw new Error(json.error);
    CURRENT_SHA = json.sha;
    showStatus(successMessage || 'تم الحفظ بنجاح ✓ (سيظهر التحديث على الموقع خلال دقيقة)', 'success');
    setTimeout(hideStatus, 4000);
  }catch(e){
    showStatus('فشل الحفظ: ' + e.message + ' — جرّبي إعادة تحميل الصفحة', 'error');
  }
}

function showStatus(msg, type){
  const el = document.getElementById('statusBar');
  el.innerText = msg;
  el.className = 'status-bar show ' + type;
}
function hideStatus(){
  document.getElementById('statusBar').className = 'status-bar';
}

// ---------- عرض الأصناف ----------
function renderCategories(){
  const container = document.getElementById('categoriesContainer');
  container.innerHTML = '';

  Object.keys(MENU_DATA.menu).forEach(catKey => {
    const cat = MENU_DATA.menu[catKey];
    const block = document.createElement('div');
    block.className = 'cat-block';

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `${CATEGORY_LABELS[catKey] || cat.label} <span class="cat-count">${cat.items.length}</span>`;
    block.appendChild(header);

    if(cat.items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-hint';
      empty.innerText = 'لا توجد أصناف بعد';
      block.appendChild(empty);
    }

    cat.items.forEach(item => {
      block.appendChild(renderItemCard(catKey, item));
    });

    container.appendChild(block);
  });
}

function renderItemCard(catKey, item){
  const card = document.createElement('div');
  card.className = 'item-card' + (item.hidden ? ' hidden-item' : '');

  const hasOffer = !!item.offer;

  card.innerHTML = `
    <div class="item-row-top">
      <div>
        <p class="item-name-field">${item.name}</p>
        <div class="item-name-en">${item.name_en}</div>
      </div>
      <div class="item-actions">
        <button class="icon-btn ${item.hidden ? 'active' : ''}" title="${item.hidden ? 'إظهار' : 'إخفاء'}" data-action="toggle-hidden">${item.hidden ? '🙈' : '👁️'}</button>
        <button class="icon-btn danger" title="حذف">🗑️</button>
      </div>
    </div>

    <div class="price-row">
      <label>السعر (ل.س)</label>
      <input type="number" class="price-input" step="500" min="0" value="${usdToSyp(item.price)}">
      <button class="save-price-btn">حفظ السعر</button>
    </div>

    <div class="offer-toggle-row">
      <label class="toggle-switch">
        <input type="checkbox" ${hasOffer ? 'checked' : ''}>
        🔥 تفعيل عرض على هذا الصنف
      </label>
      <div class="offer-fields ${hasOffer ? 'show' : ''}">
        <div class="offer-field">
          <label>تاريخ البداية</label>
          <input type="date" class="offer-start" value="${item.offer_start || ''}">
        </div>
        <div class="offer-field">
          <label>تاريخ النهاية</label>
          <input type="date" class="offer-end" value="${item.offer_end || ''}">
        </div>
      </div>
      <div style="margin-top:10px;">
        <button class="save-price-btn save-offer-btn">حفظ العرض</button>
      </div>
    </div>
  `;

  // إخفاء / إظهار
  card.querySelector('[data-action="toggle-hidden"]').addEventListener('click', async () => {
    item.hidden = !item.hidden;
    await persistMenu(item.hidden ? 'تم إخفاء الصنف ✓' : 'تم إظهار الصنف ✓');
    renderCategories();
  });

  // حذف
  card.querySelector('.icon-btn.danger').addEventListener('click', async () => {
    if(!confirm(`هل أنتِ متأكدة من حذف "${item.name}"؟`)) return;
    const cat = MENU_DATA.menu[catKey];
    cat.items = cat.items.filter(i => i.key !== item.key);
    await persistMenu('تم حذف الصنف ✓');
    renderCategories();
  });

  // حفظ السعر (المدخل بالليرة السورية، يُخزَّن داخلياً كدولار)
  card.querySelector('.save-price-btn').addEventListener('click', async () => {
    const newPriceSyp = parseFloat(card.querySelector('.price-input').value);
    if(isNaN(newPriceSyp) || newPriceSyp < 0){ alert('سعر غير صالح'); return; }
    item.price = sypToUsd(newPriceSyp);
    await persistMenu('تم تحديث السعر ✓');
  });

  // تفعيل/إلغاء العرض
  card.querySelector('.offer-toggle-row input[type="checkbox"]').addEventListener('change', (e) => {
    const fieldsEl = card.querySelector('.offer-fields');
    if(e.target.checked){
      fieldsEl.classList.add('show');
    } else {
      fieldsEl.classList.remove('show');
    }
  });

  // حفظ العرض
  card.querySelector('.save-offer-btn').addEventListener('click', async () => {
    const isChecked = card.querySelector('.offer-toggle-row input[type="checkbox"]').checked;
    const startVal = card.querySelector('.offer-start').value || null;
    const endVal = card.querySelector('.offer-end').value || null;

    if(isChecked && startVal && endVal && startVal > endVal){
      alert('تاريخ البداية يجب أن يكون قبل تاريخ النهاية');
      return;
    }

    item.offer = isChecked;
    item.offer_start = isChecked ? startVal : null;
    item.offer_end = isChecked ? endVal : null;

    await persistMenu(isChecked ? 'تم تفعيل العرض ✓' : 'تم إلغاء العرض ✓');
  });

  return card;
}

// ---------- إضافة صنف جديد ----------
function openAddModal(){
  document.getElementById('modalTitle').innerText = 'إضافة صنف جديد';
  document.getElementById('formNameAr').value = '';
  document.getElementById('formNameEn').value = '';
  document.getElementById('formDescAr').value = '';
  document.getElementById('formDescEn').value = '';
  document.getElementById('formPrice').value = '';

  const select = document.getElementById('formCategory');
  select.innerHTML = '';
  Object.keys(MENU_DATA.menu).forEach(catKey => {
    const opt = document.createElement('option');
    opt.value = catKey;
    opt.innerText = CATEGORY_LABELS[catKey] || MENU_DATA.menu[catKey].label;
    select.appendChild(opt);
  });

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
}

function slugify(text){
  return text.toString().toLowerCase().trim()
    .replace(/[^\w\u0600-\u06FF\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-') || ('item-' + Date.now());
}

async function submitAddItem(){
  const catKey = document.getElementById('formCategory').value;
  const nameAr = document.getElementById('formNameAr').value.trim();
  const nameEn = document.getElementById('formNameEn').value.trim();
  const descAr = document.getElementById('formDescAr').value.trim();
  const descEn = document.getElementById('formDescEn').value.trim();
  const priceSyp = parseFloat(document.getElementById('formPrice').value);

  if(!nameAr || !nameEn){ alert('الرجاء إدخال اسم الصنف بالعربي والإنجليزي'); return; }
  if(isNaN(priceSyp) || priceSyp < 0){ alert('الرجاء إدخال سعر صالح بالليرة السورية'); return; }
  const price = sypToUsd(priceSyp);

  let baseKey = slugify(nameEn || nameAr);
  let finalKey = baseKey;
  let counter = 2;
  const allKeys = new Set();
  Object.values(MENU_DATA.menu).forEach(cat => cat.items.forEach(i => allKeys.add(i.key)));
  while(allKeys.has(finalKey)){
    finalKey = `${baseKey}-${counter}`;
    counter++;
  }

  const newItem = {
    key: finalKey,
    name: nameAr,
    name_en: nameEn,
    desc: descAr,
    desc_en: descEn,
    price: price,
    hidden: false,
    offer: false,
    offer_start: null,
    offer_end: null,
    popular: false
  };

  MENU_DATA.menu[catKey].items.push(newItem);
  if(!MENU_DATA.images[finalKey]){
    MENU_DATA.images[finalKey] = MENU_DATA.images['default-item'] || 'img/default-item.jpg';
  }

  closeModal();
  await persistMenu('تمت إضافة الصنف ✓');
  renderCategories();
}

// ---------- تغيير كلمة السر ----------
function toggleSettingsPanel(){
  const panel = document.getElementById('settingsPanel');
  const isOpen = panel.classList.contains('show');
  panel.classList.toggle('show');
  document.getElementById('settingsToggleText').innerText = isOpen ? 'تغيير كلمة السر' : 'إخفاء';
  if(isOpen){
    // إعادة تصفير الحقول عند الإغلاق
    document.getElementById('currentPwdInput').value = '';
    document.getElementById('newPwdInput').value = '';
    document.getElementById('confirmPwdInput').value = '';
    document.getElementById('pwdStatus').innerText = '';
    document.getElementById('pwdStatus').className = 'pwd-status';
  }
}

async function submitChangePassword(){
  const currentPwd = document.getElementById('currentPwdInput').value.trim();
  const newPwd = document.getElementById('newPwdInput').value.trim();
  const confirmPwd = document.getElementById('confirmPwdInput').value.trim();
  const statusEl = document.getElementById('pwdStatus');

  statusEl.innerText = '';
  statusEl.className = 'pwd-status';

  if(!currentPwd || !newPwd || !confirmPwd){
    statusEl.innerText = 'الرجاء تعبئة جميع الحقول';
    statusEl.className = 'pwd-status error';
    return;
  }
  if(newPwd.length < 4){
    statusEl.innerText = 'كلمة السر الجديدة يجب أن تكون 4 خانات على الأقل';
    statusEl.className = 'pwd-status error';
    return;
  }
  if(newPwd !== confirmPwd){
    statusEl.innerText = 'كلمة السر الجديدة وتأكيدها غير متطابقين';
    statusEl.className = 'pwd-status error';
    return;
  }
  if(newPwd === currentPwd){
    statusEl.innerText = 'كلمة السر الجديدة مطابقة للقديمة';
    statusEl.className = 'pwd-status error';
    return;
  }

  try{
    const res = await fetch(`${API_BASE}/api/change-password`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: currentPwd, new_password: newPwd})
    });
    const json = await res.json();
    if(json.ok){
      AUTH_PASSWORD = newPwd; // تحديث كلمة السر بالذاكرة لهذه الجلسة حتى تعمل العمليات اللاحقة (حفظ، إضافة، حذف...)
      statusEl.innerText = 'تم تغيير كلمة السر بنجاح ✓';
      statusEl.className = 'pwd-status success';
      document.getElementById('currentPwdInput').value = '';
      document.getElementById('newPwdInput').value = '';
      document.getElementById('confirmPwdInput').value = '';
    } else {
      statusEl.innerText = json.error || 'فشل تغيير كلمة السر';
      statusEl.className = 'pwd-status error';
    }
  }catch(e){
    statusEl.innerText = 'تعذر الاتصال بالخدمة';
    statusEl.className = 'pwd-status error';
  }
}
</script>
